<body>

<h2>Painel Admin</h2>

<input id="nome" placeholder="Nome do Canal">
<select id="categoria">

<option value="tv">TV</option>
</select>
<input id="link" placeholder="https://origin-nxtv.b-cdn.net/TV_TEM_TK/index.m3u8?token=roku-t0k3n-v3r1fy1ng">
<button onclick="salvar()">Salvar</button>

<script>
function salvar(){
db.collection("canais").add({
  nome: nome.value,
  categoria: categoria.value,
  link: link.value
});
alert("Canal salvo!");
}
</script>
